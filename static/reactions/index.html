<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Reaction–diffusion system — Khalid Labs</title>
  <meta name="description" content="An informational overview of reaction–diffusion systems, the Gray–Scott model, and Turing patterns." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='86'>⚗</text></svg>" />
  <meta property="og:title" content="Reaction–diffusion system — Khalid Labs" />
  <meta property="og:description" content="An informational overview of reaction–diffusion systems." />
  <meta property="og:type" content="website" />
  <style>
    :root { --bg:#f4f5f7; --fg:#1c1d1f; --accent:#0b57d0; }
    *{box-sizing:border-box;} html,body{height:100%;margin:0;}
    body{background:var(--bg);color:var(--fg);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden;}
    #app{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;border:0;display:block;}
    #loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--bg);z-index:10;transition:opacity .5s ease;}
    #loader.hidden{opacity:0;pointer-events:none;}
    .spinner{width:44px;height:44px;border:4px solid rgba(0,0,0,.12);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loader-title{font-size:1.05rem;letter-spacing:.02em;opacity:.9;}
    .loader-sub{font-size:.8rem;opacity:.55;max-width:320px;text-align:center;line-height:1.5;}
    .loader-sub a{color:var(--accent);text-decoration:none;}
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner" role="status" aria-label="Loading"></div>
    <div class="loader-title">Loading…</div>
    <div class="loader-sub">First load may take a few seconds while the page loads.
      If it doesn't appear, open it
      <a href="https://profkhalid-reactions.hf.space" target="_blank" rel="noopener">directly</a>.
    </div>
  </div>
  <iframe id="app" src="https://profkhalid-reactions.hf.space"
    title="Reaction–diffusion system" allow="clipboard-write"
    referrerpolicy="no-referrer" loading="eager"></iframe>
  <script>
    var frame=document.getElementById('app'), loader=document.getElementById('loader');
    function hideLoader(){loader.classList.add('hidden');}
    frame.addEventListener('load',hideLoader);
    setTimeout(hideLoader,12000);
  </script>
</body>
</html>
